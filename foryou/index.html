<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WEB HARAM</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: url('background1.jpg'); /* GANTI BACKGROUND */
      background-size: cover;
      background-position: center;
    }

    /* KOLOM BESAR */
    .judul-box {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 20px 40px;
      font-size: 50px;
      border-radius: 20px;
      margin-bottom: 30px;
      text-align: center;
      width: fit-content;
      text-shadow: 2px 2px 10px black;
    }

    /* MENU */
    .menu {
      display: flex;
      gap: 15px;
    }

    .menu-item {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 18px;
    }

    .menu-item:hover {
      background: #ff1493;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

<!-- JUDUL -->
<div class="judul-box">
 SELAMAT MENIKMATI
  SKANDAL SALAM
</div>

<!-- MENU -->
<div class="menu">
  <div class="menu-item" onclick="go('indo.html')">MANTAN 1</div>
  <div class="menu-item" onclick="go('gambar.html')">MANTAN 2</div>
  <div class="menu-item" onclick="go('berikutnya.html')">MANTAN 3</div>
  <div class="menu-item" onclick="go('welcome.html')">MANTAN 4</div>
</div>

<script>
  function go(halaman) {
    window.location.href = halaman;
  }
</script>

</body>
</html>
